version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DANGEROUS_FUNCTIONS=true
      - SECURE_TOKEN_TEST=true
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=apikey_kratos_global_mvp_2024
      - AUTHENTICATION_GLOBAL_BUILDER=apikey_kratos_global_mvp_2024

      # Cache Config
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evo

      # Database Config
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres_kratos@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:latest
    container_name: evolution-redis
    command: redis-server --appendonly yes
    restart: always
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_kratos
      - POSTGRES_DB=evolution
    ports:
      - "5432:5432"
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data

volumes:
  evolution-postgres-data:
